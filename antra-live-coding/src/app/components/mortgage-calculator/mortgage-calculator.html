<div class="mortgage-calculator">
  <div>
    <label for="loanAmount">Loan Amount:</label>
    <input
      id="loanAmount"
      type="number"
      [formControl]="loanAmount"
    />
  </div>

  <div>
    <label for="loanTerm">Loan Term (years):</label>
    <input
      id="loanTerm"
      type="number"
      [formControl]="loanTerm"
    />
  </div>

  <div>
    <label for="interestRate">Interest Rate (%):</label>
    <input
      id="interestRate"
      type="number"
      [formControl]="interestRate"
    />
  </div>

  <button type="button" (click)="calculateMortgage()">
    Calculate
  </button>

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }

  <div class="results">
    <p>
      <strong>Monthly Payment Amount:</strong>
      @if (monthlyPayment()) {
        <strong>${{ monthlyPayment() }}</strong>
      }
    </p>

    <p>
      <strong>Total Payment Amount:</strong>
      @if (totalPayment()) {
        <strong>${{ totalPayment() }}</strong>
      }
    </p>

    <p>
      <strong>Total Interest Paid:</strong>
      @if (totalInterest()) {
        <strong>${{ totalInterest() }}</strong>
      }
    </p>
  </div>
</div>
